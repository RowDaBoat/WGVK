name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.library_type }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (static + shared)
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            library_type: static
            shared: "OFF"
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            library_type: shared
            shared: "ON"

          # macOS ARM64 (static only)
          - os: macos
            arch: aarch64
            runner: macos-latest  # Apple Silicon
            target: aarch64-apple-darwin
            library_type: static
            shared: "OFF"

          # Windows x86_64 (static + shared)
          - os: windows
            arch: x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            library_type: static
            shared: "OFF"
          - os: windows
            arch: x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            library_type: shared
            shared: "ON"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Linux dependencies
      if: matrix.os == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y wayland-protocols libwayland-dev libxkbcommon-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev mesa-vulkan-drivers

    - name: Install macOS dependencies
      if: matrix.os == 'macos'
      run: |
        brew install molten-vk

    - name: Set up build environment
      shell: bash
      run: |
        echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        
    - name: Build release binaries
      shell: bash
      run: |
        # Configure CMake for release build
        mkdir -p build-release
        cmake -B build-release \
          -DCMAKE_BUILD_TYPE=Release \
          -DWGVK_BUILD_EXAMPLES=OFF \
          -DWGVK_USE_VMA=ON \
          -DWGVK_BUILD_GLSL_SUPPORT=ON \
          -DWGVK_WGSL_SUPPORT=SIMPLE_WGSL \
          -DBUILD_SHARED_LIBS=${{ matrix.shared }} \
          -DCMAKE_INSTALL_PREFIX=./dist

        # Build the project
        cmake --build build-release --config Release --parallel 4

        # Install to dist directory
        cmake --install build-release
        
    - name: Prepare artifacts
      shell: bash
      run: |
        # Create platform-specific archive name
        REPO_NAME="${{ github.repository }}"
        REPO_NAME_SHORT="${REPO_NAME##*/}"
        ARCHIVE_NAME="${REPO_NAME_SHORT}-${{ env.RELEASE_TAG }}-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.library_type }}"
        
        # Determine file extension
        if [[ "${{ matrix.os }}" == "windows" ]]; then
          EXTENSION="zip"
        else
          EXTENSION="tar.gz"
        fi
        
        FULL_ARCHIVE_NAME="${ARCHIVE_NAME}.${EXTENSION}"
        
        # Create archive
        if [[ "${{ matrix.os }}" == "windows" ]]; then
          powershell -NoProfile -Command "Compress-Archive -Path 'dist/*' -DestinationPath '${FULL_ARCHIVE_NAME}'"
        else
          tar -czf "${FULL_ARCHIVE_NAME}" -C dist .
        fi
        
        # Save archive name for upload step
        echo "ARCHIVE_NAME=${FULL_ARCHIVE_NAME}" >> $GITHUB_ENV
        echo "ARCHIVE_PATH=${FULL_ARCHIVE_NAME}" >> $GITHUB_ENV
        
        # Display archive info
        ls -la "${FULL_ARCHIVE_NAME}"
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.library_type }}-binaries
        path: ${{ env.ARCHIVE_PATH }}
        if-no-files-found: error
        retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: always() && (needs.build.result == 'success' || contains(needs.build.result, 'success'))
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set release info
      shell: bash
      run: |
        RELEASE_TAG="${GITHUB_REF#refs/tags/}"
        echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
        
        # Get tag message for release body
        TAG_MESSAGE=$(git tag -l --format='%(contents)' "${RELEASE_TAG}" | head -20)
        if [[ -z "$TAG_MESSAGE" ]]; then
          TAG_MESSAGE="Release ${RELEASE_TAG}"
        fi
        
        {
          printf '%s\n\n' "$TAG_MESSAGE"
          cat << 'EOF'
        ## Platform Binaries
        
        Each archive contains the WGVK library + headers, built with simple_wgsl as the WGSL frontend.
        Pick `static` for a single-file link, or `shared` for a `.so`/`.dll` plus import library.
        
        EOF
          printf -- '- **Linux x86_64 (static)**: `WGVK-%s-linux-x86_64-static.tar.gz`\n' "$RELEASE_TAG"
          printf -- '- **Linux x86_64 (shared)**: `WGVK-%s-linux-x86_64-shared.tar.gz`\n' "$RELEASE_TAG"
          printf -- '- **macOS ARM64**: `WGVK-%s-macos-aarch64-static.tar.gz`\n' "$RELEASE_TAG"
          printf -- '- **Windows x86_64 (static)**: `WGVK-%s-windows-x86_64-static.zip`\n' "$RELEASE_TAG"
          printf -- '- **Windows x86_64 (shared)**: `WGVK-%s-windows-x86_64-shared.zip`\n\n' "$RELEASE_TAG"
          cat << 'EOF'
        Each archive contains:
        - The WGVK library (`libwgvk.a` / `libwgvk.so` / `wgvk.lib` / `wgvk.dll`)
        - `include/` - Header files
        
        ## Quick Start
        
        ```bash
        # Extract the archive
        tar -xzf WGVK-*.tar.gz  # Linux/macOS
        # or unzip WGVK-*.zip   # Windows
        
        # Compile your program
        gcc your_program.c -I./include -L. -lwgvk -o your_program
        ```
        
        For more examples and documentation, see the [README](https://github.com/manuel5975p/WGVK/blob/master/README.md).
        EOF
        } > RELEASE_BODY.md

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
        
    - name: Prepare release assets
      shell: bash
      run: |
        # List downloaded artifacts
        find artifacts/ -type f -name "*.tar.gz" -o -name "*.zip" | while read file; do
          echo "Found artifact: $file"
          # Move to root and rename properly
          basename_file=$(basename "$file")
          mv "$file" "./$basename_file"
        done
        
        # List final assets
        echo "Release assets:"
        ls -la *.tar.gz *.zip 2>/dev/null || echo "No archives found"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: ${{ env.RELEASE_TAG }}
        body_path: RELEASE_BODY.md
        draft: false
        prerelease: ${{ contains(env.RELEASE_TAG, '-') || contains(env.RELEASE_TAG, 'alpha') || contains(env.RELEASE_TAG, 'beta') || contains(env.RELEASE_TAG, 'rc') }}
        files: |
          *.tar.gz
          *.zip
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
